<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APGO Admin — Sign in</title>
<link rel="icon" type="image/svg+xml" href="/static/logo.svg">
<style>
  :root{
    --bg:#000; --panel:#0c0c0c; --fg:#fff; --muted:#9aa0a6;
    --line:#242424; --accent:#fff; --danger:#ff5a5a; --field:#111;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#fff; --panel:#f6f6f6; --fg:#0a0a0a; --muted:#5f6368;
           --line:#e2e2e2; --accent:#000; --danger:#c62828; --field:#fff; }
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--fg);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{
    width:100%; max-width:360px; background:var(--panel);
    border:1px solid var(--line); border-radius:16px; padding:32px 28px;
  }
  .brand{display:flex; flex-direction:column; align-items:center; gap:14px; margin-bottom:24px}
  .brand img{width:64px; height:64px; border-radius:16px}
  .brand h1{font-size:18px; margin:0; letter-spacing:.3px}
  .brand p{margin:0; color:var(--muted); font-size:13px}
  label{display:block; font-size:12px; color:var(--muted); margin:14px 0 6px; text-transform:uppercase; letter-spacing:.6px}
  input{
    width:100%; padding:11px 12px; background:var(--field); color:var(--fg);
    border:1px solid var(--line); border-radius:10px; font-size:15px; outline:none;
  }
  input:focus{border-color:var(--accent)}
  button{
    width:100%; margin-top:22px; padding:12px; border:0; border-radius:10px;
    background:var(--accent); color:var(--bg); font-size:15px; font-weight:600; cursor:pointer;
  }
  button:hover{opacity:.9}
  .err{margin-top:16px; color:var(--danger); font-size:13px; text-align:center; min-height:16px}
</style>
</head>
<body>
  <form class="card" method="POST" action="/login" autocomplete="off">
    <div class="brand">
      <img src="/static/logo.svg" alt="APGO">
      <h1>APGO Admin</h1>
      <p>Overlay node dashboard</p>
    </div>
    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocapitalize="off" autocorrect="off" spellcheck="false" autofocus>
    <label for="password">Password</label>
    <input id="password" name="password" type="password">
    <button type="submit">Sign in</button>
    <div class="err" id="err"></div>
  </form>
  <script>
    if (new URLSearchParams(location.search).has("e")) {
      document.getElementById("err").textContent = "Invalid username or password.";
    }
  </script>
</body>
</html>
